---
configuration:
  name:
    name: Name
    description: >-
      Friendly name for this satellite shown in Home Assistant. Leave empty to
      auto-generate a name based on the device MAC address.
  port:
    name: Port
    description: >-
      TCP port the ESPHome satellite server listens on (default: 6053).
  refractory_seconds:
    name: Refractory period
    description: >-
      Minimum seconds between wake word activations to prevent accidental
      double-triggers (default: 2.0).
  debug_logging:
    name: Debug logging
    description: >-
      Enable verbose debug logging.
